x-pgrst-config: &pgrst-defaults
  anon_role: &anon ${PGRST_DB_ANON_ROLE:-frontend_anon}

services:
  core-api:
    image: postgrest/postgrest
    container_name: core-api
    restart: unless-stopped

    environment:
      PGRST_SERVER_PORT: 3000
      PGRST_LOG_LEVEL: "info"

      PGRST_DB_URI: postgres://authenticator:${DB_PASSWORD}@db:5432/${DB_NAME:-getjob_db}
      PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA:-public}
      PGRST_DB_ANON_ROLE: *anon
      PGRST_DB_PRE_REQUEST: "internal.set_auth_context"

      PGRST_OPENAPI_SERVER_PROXY_URI: ${PUBLIC_API_URL}/api/v1
      PGRST_OPENAPI_MODE: ignore-privileges

    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

    networks:
      - proxy_network
